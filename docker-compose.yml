version: '3.8'
services:
  web:
    build: .
    container_name: zooki_web
    env_file:
      - .env
    depends_on:
      - db
    restart: always
  db:
    image: mysql:8.0
    container_name: zooki_db
    environment:
      MYSQL_ROOT_PASSWORD: root_password_segura
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
    volumes:
      - db_data:/var/lib/mysql
      - ./database:/docker-entrypoint-initdb.d
    restart: always
volumes:
  db_data: